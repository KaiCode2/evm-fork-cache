<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <title id="t">RPC slot fetches: evm-fork-cache vs fork-per-candidate</title>
  <desc id="d">Evaluating 500 candidates over a shared 8-slot hot set, fork-per-candidate fetches grow linearly to 4,000 while evm-fork-cache stays flat at 8 — about 500x fewer RPC reads.</desc>

  <rect x="0" y="0" width="760" height="400" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <text x="32" y="40" fill="#e6edf3" font-size="19" font-weight="700">Data fetched — 500 candidates, shared hot set</text>
  <text x="32" y="62" fill="#8b949e" font-size="12.5">fork-per-candidate re-fetches the working set every candidate; evm-fork-cache fetches it once</text>

  <!-- axes -->
  <line x1="92" y1="92" x2="92" y2="330" stroke="#30363d" stroke-width="1.5"/>
  <line x1="92" y1="330" x2="706" y2="330" stroke="#30363d" stroke-width="1.5"/>

  <!-- y gridlines + labels -->
  <g stroke="#21262d" stroke-width="1">
    <line x1="92" y1="270.5" x2="706" y2="270.5"/>
    <line x1="92" y1="211" x2="706" y2="211"/>
    <line x1="92" y1="151.5" x2="706" y2="151.5"/>
    <line x1="92" y1="92" x2="706" y2="92"/>
  </g>
  <g fill="#6e7681" font-size="11" text-anchor="end">
    <text x="84" y="334">0</text>
    <text x="84" y="274">1k</text>
    <text x="84" y="215">2k</text>
    <text x="84" y="155">3k</text>
    <text x="84" y="96">4k</text>
  </g>
  <text x="30" y="211" fill="#8b949e" font-size="11" text-anchor="middle" transform="rotate(-90 30 211)">slots fetched from RPC</text>

  <!-- x ticks -->
  <g fill="#6e7681" font-size="11" text-anchor="middle">
    <text x="92" y="348">0</text>
    <text x="214.8" y="348">100</text>
    <text x="399" y="348">250</text>
    <text x="706" y="348">500</text>
  </g>
  <text x="399" y="372" fill="#8b949e" font-size="11.5" text-anchor="middle">candidate transactions evaluated (N)</text>

  <!-- vanilla: linear N x 8 -->
  <polyline points="92,330 214.8,282.4 399,211 706,92" fill="none" stroke="#f0883e" stroke-width="2.5"/>
  <circle cx="706" cy="92" r="4.5" fill="#f0883e"/>
  <text x="700" y="86" fill="#f0883e" font-size="13" font-weight="700" text-anchor="end">4,000</text>

  <!-- crate: flat at 8 -->
  <polyline points="92,329.5 706,329.5" fill="none" stroke="#3fb950" stroke-width="2.5"/>
  <circle cx="706" cy="329.5" r="4.5" fill="#3fb950"/>
  <text x="716" y="333" fill="#3fb950" font-size="13" font-weight="700">8</text>

  <!-- legend -->
  <g font-size="12">
    <line x1="120" y1="112" x2="146" y2="112" stroke="#f0883e" stroke-width="2.5"/>
    <text x="154" y="116" fill="#c9d1d9">fork-per-candidate  =  N × 8</text>
    <line x1="120" y1="132" x2="146" y2="132" stroke="#3fb950" stroke-width="2.5"/>
    <text x="154" y="136" fill="#c9d1d9">evm-fork-cache  =  8  (fetched once)</text>
  </g>

  <!-- callout -->
  <text x="470" y="178" fill="#3fb950" font-size="26" font-weight="800" text-anchor="middle">≈ 500× fewer</text>
  <text x="470" y="200" fill="#8b949e" font-size="12.5" text-anchor="middle">RPC reads (3,992 slots avoided)</text>

  <text x="32" y="390" fill="#6e7681" font-size="10">Exact, machine-independent count (CI-pinned). Shared hot set; fully disjoint reads → 1× (no win).</text>
</svg>
