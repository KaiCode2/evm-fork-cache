<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <title id="t">Per-candidate simulation cost vs fan-out size</title>
  <desc id="d">On a log scale, evm-fork-cache per-candidate cost falls from 41 to 4 microseconds as N grows while fork-per-candidate stays flat near 2.1 milliseconds — about 545x faster at N=128.</desc>

  <rect x="0" y="0" width="760" height="400" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <text x="32" y="40" fill="#e6edf3" font-size="19" font-weight="700">Candidate throughput — amortized per-candidate cost</text>
  <text x="32" y="62" fill="#8b949e" font-size="12.5">one snapshot shared across N overlays vs a full independent fork per candidate (log scale)</text>

  <!-- axes -->
  <line x1="92" y1="92" x2="92" y2="330" stroke="#30363d" stroke-width="1.5"/>
  <line x1="92" y1="330" x2="710" y2="330" stroke="#30363d" stroke-width="1.5"/>

  <!-- y log gridlines + labels: 1us,10us,100us,1ms,10ms -->
  <g stroke="#21262d" stroke-width="1">
    <line x1="92" y1="270.5" x2="710" y2="270.5"/>
    <line x1="92" y1="211" x2="710" y2="211"/>
    <line x1="92" y1="151.5" x2="710" y2="151.5"/>
    <line x1="92" y1="92" x2="710" y2="92"/>
  </g>
  <g fill="#6e7681" font-size="11" text-anchor="end">
    <text x="84" y="334">1µs</text>
    <text x="84" y="274">10µs</text>
    <text x="84" y="215">100µs</text>
    <text x="84" y="155">1ms</text>
    <text x="84" y="96">10ms</text>
  </g>
  <text x="30" y="211" fill="#8b949e" font-size="11" text-anchor="middle" transform="rotate(-90 30 211)">cost per candidate</text>

  <!-- x ticks: N = 1, 8, 32, 128 -->
  <g fill="#6e7681" font-size="11" text-anchor="middle">
    <text x="120" y="348">1</text>
    <text x="310" y="348">8</text>
    <text x="500" y="348">32</text>
    <text x="690" y="348">128</text>
  </g>
  <text x="405" y="372" fill="#8b949e" font-size="11.5" text-anchor="middle">fan-out size (N candidates)</text>

  <!-- vanilla: flat ~2.1ms -->
  <polyline points="120,132.4 310,131.4 500,131.0 690,131.4" fill="none" stroke="#f0883e" stroke-width="2.5"/>
  <g fill="#f0883e"><circle cx="120" cy="132.4" r="4"/><circle cx="310" cy="131.4" r="4"/><circle cx="500" cy="131" r="4"/><circle cx="690" cy="131.4" r="4"/></g>
  <text x="690" y="122" fill="#f0883e" font-size="12.5" font-weight="700" text-anchor="end">≈ 2.1 ms</text>

  <!-- crate: falls 41 -> 4us -->
  <polyline points="120,234 310,275.3 500,288.9 690,294.2" fill="none" stroke="#3fb950" stroke-width="2.5"/>
  <g fill="#3fb950"><circle cx="120" cy="234" r="4"/><circle cx="310" cy="275.3" r="4"/><circle cx="500" cy="288.9" r="4"/><circle cx="690" cy="294.2" r="4"/></g>
  <text x="120" y="226" fill="#3fb950" font-size="12" font-weight="700" text-anchor="middle">41µs</text>
  <text x="690" y="310" fill="#3fb950" font-size="12.5" font-weight="700" text-anchor="end">4.0 µs</text>

  <!-- speedup bracket at N=128 -->
  <line x1="690" y1="135" x2="690" y2="290" stroke="#8b949e" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="636" y="216" fill="#e6edf3" font-size="17" font-weight="800" text-anchor="middle">~545×</text>

  <!-- legend -->
  <g font-size="12">
    <line x1="120" y1="108" x2="146" y2="108" stroke="#3fb950" stroke-width="2.5"/>
    <text x="154" y="112" fill="#c9d1d9">evm-fork-cache  (snapshot once, fan out)</text>
    <line x1="380" y1="108" x2="406" y2="108" stroke="#f0883e" stroke-width="2.5"/>
    <text x="414" y="112" fill="#c9d1d9">fork-per-candidate</text>
  </g>

  <text x="32" y="390" fill="#6e7681" font-size="10">Warm, in-memory — CPU/isolation cost, not the fetch win. Criterion medians, Apple M1 Pro; read the ratio, not the absolute.</text>
</svg>
